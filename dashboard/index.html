<!DOCTYPE html>
<html>
<head>
    <title>LeetCode Sync Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🚀 LeetCode Sync Hub</h1>
        <div class="card">
    <h2>🔥 Current Streak</h2>
    <p id="streak">0 Days</p>
</div>
<div class="card">
    <h2>📊 Difficulty Distribution</h2>

    <canvas id="difficultyChart"></canvas>
</div>
<div class="card">
    <h2>🔍 Search Solution</h2>
    <input
        type="text"
        id="search"
        placeholder="Search Problem..."
    >
</div>

        <div class="card">
            <h2>Total Solved</h2>
            <p id="total">0</p>
        </div>

        <div class="stats">

            <div class="card easy">
                <h2>Easy</h2>
                <p id="easy">0</p>
            </div>

            <div class="card medium">
                <h2>Medium</h2>
                <p id="medium">0</p>
            </div>

            <div class="card hard">
                <h2>Hard</h2>
                <p id="hard">0</p>
            </div>

        </div>

<div class="card">
    <h2>📜 Recent Activity</h2>
    <ul id="solutions"></ul>
</div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>

</body>
</html>
